<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Primary Meta Tags -->
    <title>Loopers Lab — E-commerce Web Development & Digital Studio</title>
    <meta name="title" content="Loopers Lab — E-commerce Web Development & Digital Studio" />
    <meta name="description" content="Loopers Lab builds high-performance e-commerce platforms, AI-powered integrations, and scalable web systems. UI/UX design, cloud hosting, and long-term technical maintenance — all in one studio." />
    <meta name="keywords" content="e-commerce development, web development Vietnam, UI UX design, SaaS development, AI integration, cloud hosting, digital studio" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Loopers Lab" />
    <link rel="canonical" href="https://loopers.studio/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://loopers.studio/" />
    <meta property="og:title" content="Loopers Lab — E-commerce Web Development & Digital Studio" />
    <meta property="og:description" content="Loopers Lab builds high-performance e-commerce platforms, AI-powered integrations, and scalable web systems. UI/UX design, cloud hosting, and long-term technical maintenance." />
    <meta property="og:image" content="https://loopers.studio/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Loopers Lab" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://loopers.studio/" />
    <meta name="twitter:title" content="Loopers Lab — E-commerce Web Development & Digital Studio" />
    <meta name="twitter:description" content="Loopers Lab builds high-performance e-commerce platforms, AI-powered integrations, and scalable web systems." />
    <meta name="twitter:image" content="https://loopers.studio/og-image.png" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Loopers Lab",
      "url": "https://loopers.studio",
      "logo": "https://loopers.studio/favicon.svg",
      "description": "Loopers Lab is a digital studio specializing in e-commerce web development, UI/UX design, AI integration, and cloud infrastructure.",
      "email": "hello@studio.com",
      "sameAs": [],
      "serviceArea": {
        "@type": "Place",
        "name": "Worldwide"
      }
    }
    </script>

    <!-- Structured Data: WebSite (enables sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Loopers Lab",
      "url": "https://loopers.studio",
      "description": "E-commerce web development and digital studio",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://loopers.studio/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Performance: Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
